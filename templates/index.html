<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Budget Tracker</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <main class="budget-page">
        <header class="budget-header">
            <p class="budget-kicker">Monthly cash flow planner</p>
            <h1>Household Budget Tracker</h1>
            <p>Enter household income and fixed monthly expenses to see how much money is left after bills.</p>
        </header>

        <form class="budget-form" method="POST" action="/calculate">
            <section class="household-section">
                <div class="household-header">
                    <h2>Household Members</h2>
                    <button class="secondary-button" type="button" id="add-member-button">Add Member</button>
                </div>

                <div class="household-members" id="member-list">
                    <div class="household-member">
                        <label>
                            Name
                            <input type="text" name="person_name" placeholder="Household member name" required>
                        </label>

                        <label>
                            Weekly income
                            <input type="number" name="weekly_income" min="0" step="0.01" placeholder="0.00" required>
                        </label>
                    </div>
                </div>
            </section>

            <section class="expense-section">
                <h2>Fixed Monthly Expenses</h2>

                <div class="expense-fields">
                    <label>
                        Rent / Housing
                        <input type="number" name="rent" min="0" step="0.01" placeholder="0.00" required>
                    </label>

                    <label>
                        Car lease
                        <input type="number" name="car_lease" min="0" step="0.01" placeholder="0.00" required>
                    </label>

                    <label>
                        Internet
                        <input type="number" name="internet" min="0" step="0.01" placeholder="0.00" required>
                    </label>

                    <label>
                        Phone
                        <input type="number" name="phone" min="0" step="0.01" placeholder="0.00" required>
                    </label>

                    <label>
                        Electricity
                        <input type="number" name="electricity" min="0" step="0.01" placeholder="0.00" required>
                    </label>

                    <label>
                        Gas
                        <input type="number" name="gas" min="0" step="0.01" placeholder="0.00" required>
                    </label>

                    <label>
                        Water
                        <input type="number" name="water" min="0" step="0.01" placeholder="0.00" required>
                    </label>

                    <label>
                        Food
                        <input type="number" name="food" min="0" step="0.01" placeholder="0.00" required>
                    </label>
                </div>
            </section>

            <button class="primary-button" type="submit">Calculate Budget</button>
        </form>
    </main>
    <script src="../static/script.js"></script>
</body>
</html>
